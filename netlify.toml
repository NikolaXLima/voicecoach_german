[build]
  publish   = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.transcribe]
  timeout = 26

# /transcribe on the static site → Netlify Function (keeps frontend code unchanged)
[[redirects]]
  from   = "/transcribe"
  to     = "/.netlify/functions/transcribe"
  status = 200
